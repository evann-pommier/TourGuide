name: CI - TourGuide

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Installation des dépendances locales (gpsUtil, RewardCentral, TripPricer)
        run: |
          mvn install:install-file -Dfile=libs/gpsUtil.jar -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar
          mvn install:install-file -Dfile=libs/RewardCentral.jar -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar
          mvn install:install-file -Dfile=libs/TripPricer.jar -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar

      - name: Build, tests et packaging (Maven verify)
        run: mvn --batch-mode --update-snapshots verify -Dtest='!TestPerformance'

      - name: Préparation de l'artefact
        run: mkdir staging && cp target/*.jar staging

      - name: Upload de l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: tourguide-jar
          path: staging